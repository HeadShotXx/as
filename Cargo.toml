[package]
name = "app"
version = "0.1.0"
edition = "2021"

[dependencies]
rsa = "0.9"
aes = "0.8"
cbc = { version = "0.1", features = ["block-padding"] }
pbkdf2 = { version = "0.12", features = ["hmac"] }
hmac = "0.12"
sha2 = "0.10"
sha1 = "0.10"
rand = "0.8"
rand_core = "0.6"
base64 = "0.22"
quick-xml = "0.36"
walkdir = "2.5"
dirs = "5.0"

[dev-dependencies]
tempfile = "3.10"
